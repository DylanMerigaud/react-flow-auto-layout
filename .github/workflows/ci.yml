name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: format · typecheck · lint · knip · test · build · types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Dead-code check (knip)
        run: pnpm knip

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package lint (publint)
        run: pnpm publint

      - name: Types resolution (are the types wrong?)
        run: pnpm attw --pack .
